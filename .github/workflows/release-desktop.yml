name: Release Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            command: dist:mac
            artifact_name: release-macos
            artifact_paths: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/latest-mac*.yml
          - name: Windows
            os: windows-latest
            command: dist:win
            artifact_name: release-windows
            artifact_paths: |
              release/*.exe
              release/*.blockmap
              release/latest*.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native dependencies
        run: npm run rebuild:electron

      - name: Build desktop package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run ${{ matrix.command }} -- --publish never

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**
          body: |
            ## 下载与安装

            ### macOS
            - 下载 `OpenExam-*.dmg`，拖到“应用程序”即可。
            - 当前自动构建包未做 Apple notarization，首次打开如果被系统拦截：
              - 方法 1：在 Finder 中右键 `OpenExam.app` → `打开`
              - 方法 2：终端执行 `xattr -dr com.apple.quarantine /Applications/OpenExam.app`
            - 处理后重新打开应用即可。

            ### Windows
            - 下载 `OpenExam-*.exe`，双击安装即可。
            - 若 Defender 提示，请选择“更多信息”后继续安装。

            ## 说明
            - 用户数据默认保存在本地。
            - 本 Release 由 GitHub Actions 自动构建。
          generate_release_notes: true
          append_body: true
